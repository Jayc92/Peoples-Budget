# Automated secret scanning on every push/PR (SECURITY-v2.6 §6).
# Fails the build if a committed secret is detected. Does not print secret values.
name: secret-scan
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # scan full history, not just the tip
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
